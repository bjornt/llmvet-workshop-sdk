name: Build SDK

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build:
    uses: canonical/sdkcraft-actions/.github/workflows/build.yml@99381343a0e743cd52c04057ea432fe2a7066859 # main
    with:
      runs-on: '["ubuntu-latest"]'
