name: llmvet
adopt-info: llmvet
summary: Local code-review tool for LLM/agent harnesses
description: |
  This SDK provides llmvet, a local code-review tool that shows diffs in the
  browser, lets reviewers leave inline comments, and prints a prompt for agents
  to consume. The SDK sets LLMVET_HOST to the workshop's external IP so the
  printed URL can be opened directly in a browser.
license: Apache-2.0
platforms:
  ubuntu@24.04:amd64:
    build-on: [ubuntu@24.04:amd64]
    build-for: [ubuntu@24.04:amd64]
  ubuntu@24.04:arm64:
    build-on: [ubuntu@24.04:amd64]
    build-for: [ubuntu@24.04:arm64]
  ubuntu@26.04:amd64:
    build-on: [ubuntu@26.04:amd64]
    build-for: [ubuntu@26.04:amd64]
  ubuntu@26.04:arm64:
    build-on: [ubuntu@26.04:amd64]
    build-for: [ubuntu@26.04:arm64]

parts:
  llmvet:
    plugin: dump
    source: .
    override-pull: |
      VERSION=$(cat "$CRAFT_PROJECT_DIR/VERSION")
      craftctl set version="$VERSION"
      arch="$CRAFT_ARCH_BUILD_FOR"
      if [ "$arch" = "amd64" ]; then arch="x86"; fi
      url="https://github.com/bjornt/llmvet/releases/download/v${VERSION}/llmvet-linux-${arch}"
      curl -fLo "$CRAFT_PART_SRC/llmvet" "$url"
      chmod +x "$CRAFT_PART_SRC/llmvet"
    organize:
      llmvet: usr/bin/llmvet
